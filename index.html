      name="twitter:description"
      content="A live, embeddable Windows XP desktop for React. Drag a real, running desktop on the page."
    />
    <meta name="twitter:image" content="https://eric.run.place/windows-xp/images/og.png" />
    <link rel="canonical" href="https://eric.run.place/windows-xp/" />
    <link rel="preload" as="image" href="/windows-xp/images/desktop_bg.jpg" />
    <title>The millennium internet · Windows XP Desktop Engine for React</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "@caoergou/windows-xp",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "description": "A live, embeddable, scriptable Windows XP desktop engine for React — typed events, imperative ref handle, injectable filesystem and culture packages.",
        "url": "https://eric.run.place/windows-xp/",
        "downloadUrl": "https://www.npmjs.com/package/@caoergou/windows-xp",
        "codeRepository": "https://github.com/caoergou/windows-xp",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <!-- Legacy query-string routes (#160): redirect to the new multi-page paths. -->
    <script>
      (function () {
        try {
          var p = new URLSearchParams(location.search);
          if (p.has('gallery')) {
            location.replace('gallery/' + location.hash);
            return;
          }
          if (p.get('demo') === '1') {
            var lang = p.get('lang') === 'zh' ? 'zh' : 'en';
            location.replace('demo/' + lang + '/' + location.hash);
          }
        } catch (e) {
          /* no-op: fall through to the landing page */
        }
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #07090f;
      }
      /* Static first-paint / no-JS floor: real marketing copy for SEO and for
         the ~1s before the engine embed lazy-loads. The React landing renders
         its own real-DOM copy over this; kept inside <noscript> as the no-JS floor. */
      #ssr-floor {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        text-align: center;
        padding: 24px;
        color: #fff;
        font-family: 'Trebuchet MS', Tahoma, sans-serif;
        background:
          linear-gradient(rgba(0, 40, 104, 0.35), rgba(0, 40, 104, 0.5)),
          url('/windows-xp/images/desktop_bg.jpg') center / cover no-repeat;
      }
      #ssr-floor h1 {
        font-size: clamp(28px, 5vw, 52px);
        margin: 0;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      }
      #ssr-floor p {
        max-width: 640px;
        font-size: clamp(14px, 2vw, 18px);
        line-height: 1.6;
        margin: 0;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      }
      #ssr-floor .links {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
      }
      #ssr-floor a {
        color: #fff;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.5);
        padding: 8px 16px;
        border-radius: 4px;
        text-decoration: none;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- First-paint poster + real marketing copy (replaced by the React landing,
           which re-renders the same copy as real DOM). -->
      <div id="ssr-floor">
        <h1>The millennium internet</h1>
        <p>
          A live, embeddable Windows&nbsp;XP desktop for React. This page is not a screenshot —
          it loads a real, running desktop you can drag, and drives itself with the same
          imperative API you get. 回到千禧年的互联网：实机运行、可嵌入的桌面引擎。
        </p>
        <div class="links">
          <a href="demo/zh/">进入中文桌面</a>
          <a href="demo/en/">Enter the English desktop</a>
          <a href="docs/">Docs</a>
          <a href="gallery/">Component gallery</a>
          <a href="https://github.com/caoergou/windows-xp">GitHub</a>
        </div>
      </div>
    </div>
    <noscript>
      <div style="padding: 24px; font-family: Tahoma, sans-serif">
        <h1>The millennium internet · 回到千禧年的互联网</h1>
        <p>
          A live, embeddable Windows XP desktop for React. JavaScript is required for the live
          desktop, but you can still open the demos directly:
        </p>
        <ul>
          <li><a href="demo/zh/">中文桌面 demo</a></li>
          <li><a href="demo/en/">English desktop demo</a></li>
          <li><a href="docs/">Documentation</a></li>
          <li><a href="gallery/">Component gallery</a></li>
          <li><a href="https://github.com/caoergou/windows-xp">GitHub repository</a></li>
        </ul>
      </div>
    </noscript>
    <script type="module" src="./src/site/landing-main.tsx"></script>
  </body>
</html>
