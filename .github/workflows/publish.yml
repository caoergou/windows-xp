name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm run guard:nocheck
      - run: npm run test -- --run

      - run: npm run build:lib

      - run: npm publish --access public --provenance
        env:
          # Must be a real npm automation token (registry.npmjs.org).
          # GITHUB_TOKEN does NOT authenticate against npm — add an
          # `NPM_TOKEN` repository secret (see CONTRIBUTING.md → Releases).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
