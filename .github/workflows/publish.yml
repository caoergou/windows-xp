name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm run guard:nocheck
      - run: npm run test -- --run

      - run: npm run build:lib

      # Authenticates via npm OIDC trusted publishing using the `id-token: write`
      # permission above — no token or secret required. Provenance is attached
      # automatically.
      - run: npm publish --access public --provenance
