name: Visual regression (micro-components)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  visual:
    runs-on: ubuntu-latest
    # Official Playwright image: Chromium build + fonts match the committed
    # `-linux` baselines generated for issue #99's gallery.
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run micro-component visual regression
        run: npm run test:visual
        env:
          CI: 'true'
      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
